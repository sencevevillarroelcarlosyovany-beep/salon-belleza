<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Salón de Belleza</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>💇‍♀️ Panel de Cliente</h1>
            <div class="user-info">
                <span id="clienteName"></span>
                <button id="logoutBtn" class="btn-secondary">Cerrar Sesión</button>
            </div>
        </header>

        <div class="dashboard-tabs">
            <button class="tab-btn active" data-tab="citas">📅 Mis Citas</button>
            <button class="tab-btn" data-tab="nueva">📝 Nueva Cita</button>
            <button class="tab-btn" data-tab="servicios">💆 Servicios</button>
        </div>

        <!-- Mis Citas -->
        <div id="citas-tab" class="tab-content active">
            <h2>Mis Citas</h2>
            <div id="misCitas"></div>
        </div>

        <!-- Nueva Cita -->
        <div id="nueva-tab" class="tab-content">
            <h2>Agendar Nueva Cita</h2>
            <form id="nuevaCitaForm">
                <div class="form-group">
                    <label>Servicio:</label>
                    <select id="servicioSelect" required>
                        <option value="">Seleccionar servicio...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha:</label>
                    <input type="date" id="citaFecha" required>
                </div>
                <div class="form-group">
                    <label>Hora:</label>
                    <select id="citaHora" required>
                        <option value="">Seleccionar hora disponible...</option>
                    </select>
                    <small id="horaInfo" style="color: #7f8c8d; display: block; margin-top: 5px;">
                        ⏰ Las citas son de 9:00 AM a 7:00 PM (duración aproximada 1 hora)
                    </small>
                </div>
                <div class="form-group">
                    <label>Notas adicionales:</label>
                    <textarea id="citaNotas" rows="3" placeholder="Alguna observación..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Agendar Cita</button>
                <div id="citaMessage" class="message"></div>
            </form>
            
            <!-- Calendario de disponibilidad -->
            <div id="disponibilidadContainer" style="margin-top: 30px; display: none;">
                <h3>📊 Disponibilidad del Día</h3>
                <div id="horasDisponibles" class="horas-grid"></div>
            </div>
        </div>

        <!-- Servicios -->
        <div id="servicios-tab" class="tab-content">
            <h2>Servicios Disponibles</h2>
            <div id="serviciosList"></div>
        </div>
    </div>

    <!-- JavaScript separado -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cliente.js"></script>
    <script src="js/cliente-dashboard.js"></script>
</body>
</html>
