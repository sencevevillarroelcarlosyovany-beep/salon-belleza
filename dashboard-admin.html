<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Salón de Belleza</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>💇‍♀️ Panel de Administración</h1>
            <div class="user-info">
                <span id="adminName"></span>
                <button id="logoutBtn" class="btn-secondary">Cerrar Sesión</button>
            </div>
        </header>

        <div class="dashboard-tabs">
            <button class="tab-btn active" data-tab="pendientes">📋 Solicitudes</button>
            <button class="tab-btn" data-tab="citas">📅 Citas</button>
            <button class="tab-btn" data-tab="estadisticas">📊 Estadísticas</button>
        </div>

        <!-- Solicitudes Pendientes -->
        <div id="pendientes-tab" class="tab-content active">
            <h2>Solicitudes de Clientes</h2>
            <div id="pendientesList"></div>
        </div>

        <!-- Citas -->
        <div id="citas-tab" class="tab-content">
            <h2>Gestión de Citas</h2>
            <div class="filtro-citas">
                <input type="date" id="filtroFecha">
                <select id="filtroEstado">
                    <option value="">Todos</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="confirmada">Confirmadas</option>
                    <option value="completada">Completadas</option>
                    <option value="cancelada">Canceladas</option>
                </select>
                <button id="filtrarCitasBtn" class="btn-primary">Filtrar</button>
            </div>
            <div id="citasList"></div>
        </div>

        <!-- Estadísticas con Reportes -->
        <div id="estadisticas-tab" class="tab-content">
            <h2>📊 Estadísticas y Reportes</h2>
            
            <!-- Botones de Reportes -->
            <div class="reportes-actions">
                <button id="reportePDFBtn" class="btn-pdf">📄 Generar Reporte PDF</button>
                <button id="reporteHTMLBtn" class="btn-success">🌐 Ver Reporte HTML</button>
                <button id="exportarExcelBtn" class="btn-excel">📊 Exportar a Excel (CSV)</button>
                <button id="imprimirBtn" class="btn-imprimir">🖨️ Imprimir Reporte</button>
            </div>
            
            <!-- Estadísticas -->
            <div id="estadisticasContainer" class="stats-grid"></div>
            
            <!-- Contenedor para mostrar reporte HTML -->
            <div id="reporteContainer" class="reporte-container">
                <div id="reporteContent" class="reporte-content"></div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- TODOS LOS SCRIPTS - ORDEN CORRECTO            -->
    <!-- ============================================ -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/reportes.js"></script>
    
    <!-- Este es el script principal del admin -->
    <script>
        // ============================================
        // CÓDIGO COMPLETO DEL DASHBOARD ADMIN (INLINE)
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Dashboard Admin iniciado');
            
            // Verificar que las clases estén disponibles
            if (typeof Auth === 'undefined') {
                console.error('❌ Auth no está definido');
                return;
            }
            if (typeof Admin === 'undefined') {
                console.error('❌ Admin no está definido');
                return;
            }
            if (typeof Reportes === 'undefined') {
                console.error('❌ Reportes no está definido');
                return;
            }

            const auth = new Auth();
            const admin = new Admin();
            const reportes = new Reportes();
            
            // Verificar autenticación
            const user = auth.checkAuth('admin');
            if (!user) {
                console.error('❌ Usuario no autenticado');
                return;
            }

            console.log('✅ Usuario autenticado:', user.nombre);

            // Mostrar nombre del admin
            document.getElementById('adminName').textContent = `👋 ${user.nombre}`;

            // Cargar datos iniciales
            cargarPendientes();
            cargarCitas();
            cargarEstadisticas();

            // ============ TABS ============
            document.querySelectorAll('.dashboard-tabs .tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.dashboard-tabs .tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById(tab + '-tab').classList.add('active');
                    
                    if (tab === 'pendientes') cargarPendientes();
                    if (tab === 'citas') cargarCitas();
                    if (tab === 'estadisticas') {
                        cargarEstadisticas();
                        document.getElementById('reporteContainer').classList.remove('visible');
                    }
                });
            });

            // ============ FILTRAR CITAS ============
            document.getElementById('filtrarCitasBtn').addEventListener('click', cargarCitas);

            // ============ BOTONES DE REPORTES ============
            document.getElementById('reportePDFBtn').addEventListener('click', function() {
                reportes.generarPDF();
            });

            document.getElementById('reporteHTMLBtn').addEventListener('click', function() {
                reportes.generarHTML();
            });

            document.getElementById('exportarExcelBtn').addEventListener('click', function() {
                reportes.exportarCSV();
            });

            document.getElementById('imprimirBtn').addEventListener('click', function() {
                reportes.imprimir();
            });

            // ============ FUNCIONES ============

            async function cargarPendientes() {
                try {
                    const pendientes = await auth.getClientesPendientes();
                    const container = document.getElementById('pendientesList');
                    
                    if (pendientes.length === 0) {
                        container.innerHTML = '<p class="empty">No hay solicitudes pendientes</p>';
                        return;
                    }

                    container.innerHTML = pendientes.map(cliente => `
                        <div class="card solicitud-card">
                            <div class="solicitud-info">
                                <h3>${cliente.nombre}</h3>
                                <p>📧 ${cliente.email}</p>
                                <p>📱 ${cliente.telefono || 'No especificado'}</p>
                                <small>📅 ${new Date(cliente.created_at).toLocaleDateString()}</small>
                            </div>
                            <button onclick="window.aprobarCliente('${cliente.id}')" class="btn-success">
                                ✅ Aprobar
                            </button>
                        </div>
                    `).join('');
                } catch (error) {
                    document.getElementById('pendientesList').innerHTML = 
                        `<p class="error">Error: ${error.message}</p>`;
                }
            }

            // Función global para aprobar cliente
            window.aprobarCliente = async function(userId) {
                try {
                    await auth.aprobarCliente(userId);
                    alert('✅ Cliente aprobado correctamente');
                    cargarPendientes();
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            };

            async function cargarCitas() {
                try {
                    const fecha = document.getElementById('filtroFecha').value;
                    const estado = document.getElementById('filtroEstado').value;
                    
                    let citas;
                    if (fecha) {
                        citas = await admin.getCitasPorFecha(fecha);
                    } else if (estado) {
                        citas = await admin.getCitas(estado);
                    } else {
                        citas = await admin.getCitas();
                    }

                    // Guardar para reportes
                    reportes.todasLasCitas = citas;

                    const container = document.getElementById('citasList');
                    
                    if (citas.length === 0) {
                        container.innerHTML = '<p class="empty">No hay citas registradas</p>';
                        return;
                    }

                    container.innerHTML = citas.map(cita => `
                        <div class="card cita-card">
                            <div class="cita-info">
                                <h3>${cita.servicio}</h3>
                                <p>👤 ${cita.usuarios ? cita.usuarios.nombre : 'N/A'}</p>
                                <p>📧 ${cita.usuarios ? cita.usuarios.email : 'N/A'}</p>
                                <p>📅 ${cita.fecha} ⏰ ${cita.hora}</p>
                                <p>Estado: <span class="estado-${cita.estado}">${cita.estado}</span></p>
                                ${cita.notas ? `<p>📝 ${cita.notas}</p>` : ''}
                            </div>
                            <div class="cita-actions">
                                ${cita.estado === 'pendiente' ? `
                                    <button onclick="window.updateCita('${cita.id}', 'confirmada')" class="btn-success">Confirmar</button>
                                ` : ''}
                                ${cita.estado === 'confirmada' ? `
                                    <button onclick="window.updateCita('${cita.id}', 'completada')" class="btn-primary">Completar</button>
                                ` : ''}
                                ${cita.estado !== 'cancelada' && cita.estado !== 'completada' ? `
                                    <button onclick="window.updateCita('${cita.id}', 'cancelada')" class="btn-danger">Cancelar</button>
                                ` : ''}
                                <button onclick="window.generarFactura('${cita.id}')" class="btn-info">Factura</button>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    document.getElementById('citasList').innerHTML = 
                        `<p class="error">Error: ${error.message}</p>`;
                }
            }

            // Funciones globales para citas
            window.updateCita = async function(citaId, estado) {
                if (!confirm(`¿Cambiar estado a "${estado}"?`)) return;
                
                try {
                    await admin.updateCitaEstado(citaId, estado);
                    alert('✅ Estado actualizado');
                    cargarCitas();
                    cargarEstadisticas();
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            };

            window.generarFactura = async function(citaId) {
                try {
                    const citas = await admin.getCitas();
                    const cita = citas.find(c => c.id === citaId);
                    
                    if (!cita) {
                        alert('Cita no encontrada');
                        return;
                    }

                    const factura = admin.generarFactura(cita);
                    
                    const facturaHTML = `
                        <div class="factura-modal">
                            <h2>🧾 FACTURA</h2>
                            <p><strong>Número:</strong> ${factura.numero}</p>
                            <p><strong>Fecha:</strong> ${factura.fecha}</p>
                            <hr>
                            <p><strong>Cliente:</strong> ${factura.cliente}</p>
                            <p><strong>Servicio:</strong> ${factura.servicio}</p>
                            <p><strong>Total:</strong> $${factura.total.toFixed(2)}</p>
                            <hr>
                            <button onclick="this.parentElement.remove()" class="btn-primary">Cerrar</button>
                        </div>
                    `;
                    
                    const div = document.createElement('div');
                    div.innerHTML = facturaHTML;
                    document.body.appendChild(div.firstElementChild);
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            };

            async function cargarEstadisticas() {
                try {
                    const stats = await admin.getEstadisticas();
                    const container = document.getElementById('estadisticasContainer');
                    
                    container.innerHTML = `
                        <div class="stat-card">
                            <h3>Total Citas</h3>
                            <p class="stat-number">${stats.total}</p>
                        </div>
                        <div class="stat-card">
                            <h3>Pendientes</h3>
                            <p class="stat-number">${stats.pendientes}</p>
                        </div>
                        <div class="stat-card">
                            <h3>Confirmadas</h3>
                            <p class="stat-number">${stats.confirmadas}</p>
                        </div>
                        <div class="stat-card">
                            <h3>Completadas</h3>
                            <p class="stat-number">${stats.completadas}</p>
                        </div>
                        <div class="stat-card">
                            <h3>Canceladas</h3>
                            <p class="stat-number">${stats.canceladas}</p>
                        </div>
                        <div class="stat-card stat-card-ingresos">
                            <h3>💰 Ingresos</h3>
                            <p class="stat-number">$${stats.ingresos.toFixed(2)}</p>
                        </div>
                    `;
                } catch (error) {
                    document.getElementById('estadisticasContainer').innerHTML = 
                        `<p class="error">Error: ${error.message}</p>`;
                }
            }

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function() {
                auth.logout();
            });
        });
    </script>
</body>
</html>
